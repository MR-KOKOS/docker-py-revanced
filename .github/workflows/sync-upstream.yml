name: Sync Upstream

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

concurrency:
  group: sync-upstream-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.UPSTREAM_SYNC_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/nikhilbadyal/docker-py-revanced.git
          git fetch upstream main:refs/remotes/upstream/main

      - name: Rebase customization onto upstream
        run: |
          git checkout main
          git rebase upstream/main

      - name: Push changes
        run: |
          git push --force-with-lease origin main
